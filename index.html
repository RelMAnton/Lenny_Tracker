<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f4f4f7">
  <title>Лёня-трекер</title>
  <link rel="manifest" href="manifest.json">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    :root {
      --bg: #f0f0f5;
      --surface: #ffffff;
      --surface2: #eeeef3;
      --border: #dddde8;
      --accent: #7c6af7;
      --accent2: #5b4de0;
      --text: #1a1a2e;
      --text-muted: #8888aa;
      --success: #16a34a;
      --warn: #d97706;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    .header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .dog-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa, #7c6af7);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .header-info h1 {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .header-info p {
      font-size: 12px;
      color: var(--text-muted);
    }
    .header-actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.15s;
    }
    .icon-btn:active { background: var(--border); }

    /* TABS */
    .tabs {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }
    .tab.active { color: var(--accent2); }
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 20%; right: 20%;
      height: 2px;
      border-radius: 2px 2px 0 0;
      background: var(--accent);
    }

    /* MAIN CONTENT AREA */
    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      background: #f0f0f5;
    }

    /* LOG TAB */
    .log-view { padding: 12px 16px; }

    .day-group { margin-bottom: 16px; }
    .day-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .log-entry {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .entry-icon { font-size: 26px; flex-shrink: 0; }
    .entry-body { flex: 1; }
    .entry-label {
      font-size: 15px;
      font-weight: 700;
    }
    .entry-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .entry-time {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 600;
      flex-shrink: 0;
    }
    .entry-delete {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .entry-delete:active { background: #fee2e2; color: var(--danger); }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ACTION TAB */
    .action-view {
      padding: 12px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      height: 100%;
    }
    .action-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }
    .action-row {
      display: flex;
      gap: 10px;
      flex: 1;
    }
    .action-btn {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
      position: relative;
      overflow: hidden;
      min-height: 90px;
    }
    .action-btn:active {
      transform: scale(0.95);
      background: var(--surface2);
    }
    .action-btn .btn-icon { font-size: 36px; line-height: 1; }
    .action-btn .btn-label {
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      color: var(--text);
      padding: 0 8px;
    }

    .btn-pee { border-color: #fde68a; }
    .btn-pee:active { border-color: var(--warn); box-shadow: 0 0 0 2px #d9770620; }
    .btn-poop-ok { border-color: #d4b896; }
    .btn-poop-ok:active { border-color: #92400e; box-shadow: 0 0 0 2px #92400e20; }
    .btn-poop-bad { border-color: #fca5a5; }
    .btn-poop-bad:active { border-color: var(--danger); box-shadow: 0 0 0 2px #dc262620; }
    .btn-eat { border-color: #86efac; }
    .btn-eat:active { border-color: var(--success); box-shadow: 0 0 0 2px #16a34a20; }
    .btn-sick { border-color: #d8b4fe; }
    .btn-sick:active { border-color: #7c3aed; box-shadow: 0 0 0 2px #7c3aed20; }
    .btn-other { border-color: #cbd5e1; }
    .btn-other:active { border-color: #64748b; box-shadow: 0 0 0 2px #64748b20; }

    .custom-input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      outline: none;
      margin-top: 4px;
    }
    .custom-input:focus { border-color: var(--accent); }

    /* Location modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 20px 20px 40px;
      width: 100%;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-title {
      font-size: 16px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
    }
    .modal-sub {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 20px;
    }
    .modal-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .modal-btn {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .modal-btn:active { background: var(--border); }
    .modal-btn.outside { border-color: var(--accent); color: var(--accent2); }
    .modal-btn.cancel { border-color: transparent; color: var(--text-muted); grid-column: 1/-1; }

    .log-view { padding: 12px 16px; display: flex; flex-direction: column; gap: 12px; }
    .export-btn {
      width: 100%;
      padding: 12px;
      border-radius: 14px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .export-btn:active { background: var(--surface2); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(0);
      background: var(--surface2);
      border: 1px solid var(--accent);
      border-radius: 50px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      color: var(--accent2);
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
      animation: toastIn 0.25s ease, toastOut 0.25s ease 1.5s forwards;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(12px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes toastOut {
      to { opacity: 0; transform: translateX(-50%) translateY(12px); }
    }

  #tab-actions { flex: 1; }
    .content::-webkit-scrollbar { width: 4px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

<div class="header">
  <div class="dog-avatar">🐶</div>
  <div class="header-info">
    <h1>Лёня-трекер</h1>
    <p id="today-summary">Загрузка...</p>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="actions" onclick="switchTab('actions')">🐾 Действия</div>
  <div class="tab" data-tab="log" onclick="switchTab('log')">📋 Журнал</div>

</div>

<div class="content">
  <!-- ACTIONS TAB -->
  <div id="tab-actions" class="action-view">
    <div class="action-grid">
      <div class="action-row">
        <button class="action-btn btn-poop-bad" onclick="logAction('poop_bad')">
          <span class="btn-icon">💩😐</span>
          <span class="btn-label">Покакал</span>
        </button>
        <button class="action-btn btn-poop-ok" onclick="logAction('poop_ok')">
          <span class="btn-icon">💩✅</span>
          <span class="btn-label">Покакал</span>
        </button>
      </div>
      <div class="action-row">
        <button class="action-btn btn-eat" onclick="logAction('eat')">
          <span class="btn-icon">🥣</span>
          <span class="btn-label">Поел</span>
        </button>
        <button class="action-btn btn-pee" onclick="logAction('pee')">
          <span class="btn-icon">💧</span>
          <span class="btn-label">Пописал</span>
        </button>
      </div>
      <div class="action-row">
        <button class="action-btn btn-sick" onclick="logAction('sick')">
          <span class="btn-icon">🤢</span>
          <span class="btn-label">Тошнило</span>
        </button>
        <button class="action-btn btn-other" onclick="openCustomModal()">
          <span class="btn-icon">✏️</span>
          <span class="btn-label">Другое</span>
        </button>
      </div>
    </div>
  </div>

  <!-- LOG TAB -->
  <div id="tab-log" class="log-view" style="display:none;">
    <button class="export-btn" onclick="exportData()">📥 Скачать лог (.txt)</button>
    <div id="log-list"></div>
  </div>


</div>

<!-- Location Modal -->
<div class="modal-overlay" id="location-modal" style="display:none;" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title">Где это было?</div>
    <div class="modal-sub">Выбери место</div>
    <div class="modal-btns">
      <button class="modal-btn outside" onclick="confirmLocation('outside')">🌿 На улице</button>
      <button class="modal-btn" onclick="confirmLocation('inside')">🏠 Дома</button>
      <button class="modal-btn cancel" onclick="closeModal()">Отмена</button>
    </div>
  </div>
</div>

<!-- Custom Event Modal -->
<div class="modal-overlay" id="custom-modal" style="display:none;" onclick="closeCustomModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">✏️ Своё событие</div>
    <div class="modal-sub">Что произошло?</div>
    <input id="custom-input" class="custom-input" type="text" placeholder="Например: глистогонка" maxlength="60">
    <div class="modal-btns" style="margin-top:14px;">
      <button class="modal-btn outside" onclick="saveCustomEntry()" style="grid-column:1/-1">💾 Сохранить</button>
      <button class="modal-btn cancel" onclick="closeCustomModal()">Отмена</button>
    </div>
  </div>
</div>

<script>
const ACTIONS = {
  pee:      { label: 'Пописал',        icon: '💧',    askLocation: true },
  poop_ok:  { label: 'Покакал',        icon: '💩✅',  askLocation: true },
  poop_bad: { label: 'Покакал',        icon: '💩😐',  askLocation: true },
  eat:      { label: 'Поел',           icon: '🥣',    askLocation: false },
  sick:     { label: 'Тошнило',        icon: '🤢',    askLocation: false },
};

const API = 'https://script.google.com/macros/s/AKfycbz-S2QsnRJxaVZAUsPIejTkMI2w__qgZcoNnAnAM43HpkRX95Eo_eaIA7ZqKeXEq4mlfw/exec';

let pendingAction = null;
let cachedEntries = [];

// ── API ───────────────────────────────────────────────────
async function fetchEntries() {
  try {
    const res = await fetch(API);
    cachedEntries = await res.json();
  } catch (e) {
    console.error('Fetch error', e);
  }
}

async function postEntry(entry) {
  await fetch(API, {
    method: 'POST',
    body: JSON.stringify({ action: 'add', ...entry }),
  });
}

async function deleteEntryRemote(id) {
  await fetch(API, {
    method: 'POST',
    body: JSON.stringify({ action: 'delete', id }),
  });
}

// ── Actions ───────────────────────────────────────────────
function logAction(type) {
  pendingAction = type;
  const cfg = ACTIONS[type];
  if (cfg.askLocation) {
    document.getElementById('modal-title').textContent = `${cfg.icon} ${cfg.label}`;
    document.getElementById('location-modal').style.display = 'flex';
  } else {
    saveEntry(type, null);
  }
}

function confirmLocation(loc) {
  closeModal();
  saveEntry(pendingAction, loc);
}

function closeModal() {
  document.getElementById('location-modal').style.display = 'none';
}

async function saveEntry(type, location) {
  const cfg = ACTIONS[type];
  const entry = {
    id: Date.now(),
    type,
    label: cfg.label,
    icon: cfg.icon,
    location: location || '',
    timestamp: new Date().toISOString()
  };
  // Optimistic update
  cachedEntries.unshift({ ...entry, ts: entry.timestamp });
  updateSummary();
  showToast(formatEntryLabel(entry));
  // Send to sheet
  try {
    await postEntry(entry);
  } catch(e) {
    showToast('⚠️ Ошибка сохранения');
  }
}

async function deleteEntry(id) {
  cachedEntries = cachedEntries.filter(e => String(e.id) !== String(id));
  renderLog();
  updateSummary();
  try {
    await deleteEntryRemote(id);
  } catch(e) {
    showToast('⚠️ Ошибка удаления');
  }
}

// ── Formatting ────────────────────────────────────────────
function formatEntryLabel(entry) {
  const cfg = ACTIONS[entry.type];
  const locStr = entry.location === 'outside' ? ' · 🌿 на улице'
               : entry.location === 'inside'  ? ' · 🏠 дома'
               : '';
  return `${cfg.icon} ${cfg.label}${locStr}`;
}

function formatTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' });
}

function formatDayLabel(iso) {
  const d = new Date(iso);
  const today = new Date();
  const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
  if (isSameDay(d, today)) return 'Сегодня';
  if (isSameDay(d, yesterday)) return 'Вчера';
  return d.toLocaleDateString('ru', { day: 'numeric', month: 'long' });
}

function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear()
    && a.getMonth() === b.getMonth()
    && a.getDate() === b.getDate();
}

// ── Render Log ────────────────────────────────────────────
function renderLog() {
  const entries = cachedEntries;
  const container = document.getElementById('log-list');

  if (!entries.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🐾</div><p>Пока нет записей.<br>Нажми «Действия», чтобы добавить!</p></div>`;
    return;
  }

  const groups = {};
  entries.forEach(e => {
    const ts = e.ts || e.timestamp;
    const d = new Date(ts);
    const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if (!groups[key]) groups[key] = { label: formatDayLabel(ts), entries: [] };
    groups[key].entries.push(e);
  });

  container.innerHTML = Object.values(groups).map(g => `
    <div class="day-group">
      <div class="day-label">${g.label}</div>
      ${g.entries.map(e => {
        const ts = e.ts || e.timestamp;
        const cfg = ACTIONS[e.type] || { icon: e.icon || '?', label: e.label || e.type };
        const loc = e.location === 'outside' ? '🌿 На улице' : e.location === 'inside' ? '🏠 Дома' : '';
        return `
        <div class="log-entry">
          <div class="entry-icon">${cfg.icon}</div>
          <div class="entry-body">
            <div class="entry-label">${cfg.label}</div>
            ${loc ? `<div class="entry-sub">${loc}</div>` : ''}
          </div>
          <div class="entry-time">${formatTime(ts)}</div>
          <button class="entry-delete" onclick="deleteEntry('${e.id}')">✕</button>
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

// ── Summary ───────────────────────────────────────────────
function updateSummary() {
  const today = cachedEntries.filter(e => isSameDay(new Date(e.ts || e.timestamp), new Date()));
  const label = today.length === 0 ? 'Сегодня нет событий'
    : `Сегодня ${today.length} ${plural(today.length, 'запись', 'записи', 'записей')}`;
  document.getElementById('today-summary').textContent = label;
}

function plural(n, f1, f2, f5) {
  const m10 = n % 10, m100 = n % 100;
  if (m10 === 1 && m100 !== 11) return f1;
  if (m10 >= 2 && m10 <= 4 && !(m100 >= 12 && m100 <= 14)) return f2;
  return f5;
}

// ── Toast ─────────────────────────────────────────────────
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = `✅ ${msg}`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ── Export ────────────────────────────────────────────────
function exportData() {
  const lines = cachedEntries.map(e => {
    const ts = e.ts || e.timestamp;
    const date = new Date(ts).toLocaleDateString('ru');
    const time = formatTime(ts);
    const loc = e.location === 'outside' ? ' (на улице)' : e.location === 'inside' ? ' (дома)' : '';
    return `${date} ${time} — ${e.label || e.type}${loc}`;
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `lenya-tracker-${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Tabs ──────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  ['actions', 'log'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display = t === name ? '' : 'none';
  });
  if (name === 'log') renderLog();
}

function openCustomModal() {
  document.getElementById('custom-input').value = '';
  document.getElementById('custom-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('custom-input').focus(), 100);
}

function closeCustomModal() {
  document.getElementById('custom-modal').style.display = 'none';
}

async function saveCustomEntry() {
  const text = document.getElementById('custom-input').value.trim();
  if (!text) return;
  closeCustomModal();
  const entry = {
    id: Date.now(),
    type: 'custom',
    label: text,
    icon: '✏️',
    location: '',
    timestamp: new Date().toISOString()
  };
  cachedEntries.unshift({ ...entry, ts: entry.timestamp });
  updateSummary();
  showToast(`✏️ ${text}`);
  try {
    await postEntry(entry);
  } catch(e) {
    showToast('⚠️ Ошибка сохранения');
  }
}
(async () => {
  document.getElementById('today-summary').textContent = 'Загрузка...';
  document.getElementById('custom-input').addEventListener('keydown', e => {
